# Airflow + MLflow + MinIO deployment for the coding-agent evaluation pipeline.
#
# Based on the official Airflow docker-compose
# (https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/),
# trimmed to LocalExecutor (no Redis/Celery worker — single-VM deployment) and
# extended with MLflow and MinIO services.
#
# Required in .env (see .env.example):
#   NEBIUS_API_KEY, HOST_PROJECT_DIR, AIRFLOW_UID, DOCKER_GID
# Reused data: ./minio-data (buckets) and ./mlflow-data/mlflow.db carry over
# from the standalone Phase 2 setup.

name: mlops

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.0}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${JWT_SECRET:-insecure-dev-jwt-secret-change-me}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Dev-mode dependency install; production would bake a custom Airflow image.
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-apache-airflow-providers-docker}
    # --- pipeline configuration (read by dags/evaluate_agent_docker.py) ---
    NEBIUS_API_KEY: ${NEBIUS_API_KEY}
    HOST_PROJECT_DIR: ${HOST_PROJECT_DIR}
    DOCKER_NETWORK: mlops_default
    AGENT_IMAGE: ${AGENT_IMAGE:-agent-eval:latest}
    AIRFLOW_RUNS_ROOT: /opt/airflow/runs
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_EXPERIMENT: ${MLFLOW_EXPERIMENT:-swe-bench-agent-eval}
    S3_ENDPOINT_URL: http://minio:9000
    S3_BUCKET: ${S3_BUCKET:-mlops-agent-eval-runs}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/runs:/opt/airflow/runs
    # DockerOperator talks to the host Docker daemon (sibling containers):
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  # Grant access to the mounted docker socket (host docker group id):
  group_add:
    - "${DOCKER_GID:-999}"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config /opt/airflow/runs
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config /opt/airflow/runs
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"

  # ---------------------------------------------------------------- storage --

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin} &&
             mc mb -p local/${S3_BUCKET:-mlops-agent-eval-runs} &&
             mc mb -p local/mlflow-artifacts"

  # --------------------------------------------------------------- tracking --

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      sh -c "pip install --quiet boto3 &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri sqlite:////mlflow/mlflow.db
             --artifacts-destination s3://mlflow-artifacts/"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow-data:/mlflow
    restart: always

volumes:
  postgres-db-volume:
